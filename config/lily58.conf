# El intervalo del informe de batería es en segundos
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=150
# Aumentar el anti-rebote (debounce) del teclado
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=7
# Aumentar la potencia de transmisión de la radio BLE del teclado, para resolver problemas de latencia y mala comunicación entre ambas mitades
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# Cambiar el nombre de visualización predeterminado del teclado
CONFIG_ZMK_KEYBOARD_NAME="\\(0_0)/ Lily58"
# Utilizado para resolver errores relacionados con el informe de batería en Windows
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# Configuración relacionada con OLED
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
# Habilitar un widget para mostrar palabras por minuto (WPM)
#CONFIG_ZMK_WIDGET_WPM_STATUS=n
#CONFIG_ZMK_WIDGET_LAYER_STATUS=n
#CONFIG_ZMK_WIDGET_PERIPHERAL_STATUS=n
# Animación del Bongo cat tecleando
#CONFIG_ZMK_WIDGET_BONGO_CAT=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=n

# Configuración relacionada con la suspensión (reposo)
# Milisegundos de inactividad antes de entrar en estado inactivo (10 minutos)
CONFIG_ZMK_IDLE_TIMEOUT=600000
# Habilitar soporte para suspensión profunda (deep sleep)
CONFIG_ZMK_SLEEP=y
# Milisegundos de inactividad antes de entrar en suspensión profunda     (15 minutos)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Configuración relacionada con ZMK Studio
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO_LOCK_ON_DISCONNECT=n

# Configuración relacionada con RGB
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
# Apagar el RGB cuando el teclado entra en estado inactivo
#CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=220
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=50

# Configuración de la perilla (encoder giratorio)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_CUSTOM_ANIMATION_SPEED=300000 
# 300 second total duration